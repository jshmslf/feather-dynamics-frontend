<header class="header" [ngClass]="{ 'sticky-on': isSticky, 'white-header': isWhiteHeader }">

        <div class="logo">
            <a href="/">
                <img class="logo-black" src="/assets/logo-text-black.png" alt="Feather Dynamics">
                <img class="logo-white" src="/assets/logo-text-white.png" alt="Feather Dynamics">
            </a>
        </div>

        <nav class="nav">
            <a href="/news" class="underline-animation">News</a>
            <a href="/who-we-are" class="underline-animation">Who We Are</a>

        </nav>
    </div>
</header>
