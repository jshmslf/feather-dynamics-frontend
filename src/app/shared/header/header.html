<header class="header" [ngClass]="{
        'sticky-on': isSticky,
        'hidden': isHidden,
        'menu-open': isMenuOpen
    }">
    <div class="global-container header-inner">
        <!-- Logo -->
        <div class="logo">
            <a href="/">
                <img class="logo-black" src="/assets/logo-text-black.png" alt="Feather Dynamics" />
                <img class="logo-white" src="/assets/logo-text-white.png" alt="Feather Dynamics" />
            </a>
        </div>

        <!-- Burger -->
        <button class="burger" aria-label="Toggle navigation" (click)="toggleMenu()">
            <i class="fa-solid" [ngClass]="isMenuOpen ? 'fa-xmark' : 'fa-bars'"></i>
        </button>

        <!-- Navigation -->
        <nav class="nav">
            <a routerLink="/news" routerLinkActive="active" (click)="closeMenu()">NEWS</a>
            <a routerLink="/who-we-are" routerLinkActive="active" (click)="closeMenu()">WHO WE ARE</a>
            <a routerLink="/what-we-do" routerLinkActive="active" (click)="closeMenu()">WHAT WE DO</a>
            <a routerLink="/darpa-lift" routerLinkActive="active" (click)="closeMenu()">DARPA LIFT</a>
            <a routerLink="/contact-us" routerLinkActive="active" (click)="closeMenu()">CONTACT US</a>
        </nav>
    </div>
</header>
