<div class="article" #articleRoot>

    <!-- ── Hero ─────────────────────────────────────── -->
    <div class="article__hero">
        <img [src]="article?.image" [alt]="article?.title" class="article__hero-img" #heroImg />
        <div class="article__hero-veil"></div>
    </div>

    <!-- ── Offset Title Block ────────────────────────── -->
    <div class="article__title-block" #titleBlock>
        <div class="article__meta-strip">
            <span class="article__category">{{ article?.category }}</span>
            <span class="article__meta-sep">—</span>
            <time class="article__date">{{ article?.publishedAt | date:'MMMM d, yyyy' }}</time>
        </div>
        <h1 class="article__title">{{ article?.title }}</h1>
    </div>

    <!-- ── Body ─────────────────────────────────────── -->
    <div class="article__body">

        <!-- Sidebar -->
        <aside class="article__sidebar" #sidebar>
            <div class="article__sidebar-rule"></div>

            <nav class="article__toc" *ngIf="headings.length">
                <span class="article__toc-label">Contents</span>
                <a *ngFor="let h of headings; let i = index" class="article__toc-link"
                    [class.active]="activeHeading === i" (click)="scrollToHeading(i)">
                    {{ h }}
                </a>
            </nav>

            <a routerLink="/news" class="article__back">
                <span class="article__back-arrow">←</span>
                All News
            </a>
        </aside>

        <!-- Prose -->
        <main class="article__prose" #prose>
            <p class="article__excerpt">{{ article?.excerpt }}</p>
            <!-- <div class="article__content" [innerHTML]="article?.content"></div> -->
            <markdown [data]="article?.content" class="article__content"/>
        </main>

    </div>

<!-- ── Footer ───────────────────────────────────── -->
<footer class="article__footer" #articleFooter>
    <div class="article__footer-rule"></div>
    <div class="article__footer-row">
        <span class="article__footer-tag">{{ article?.category | uppercase }} · FEATHER DYNAMICS</span>

        <!-- Share bar -->
        <div class="article__share">
            <span class="article__share-label">Share</span>

            <!-- LinkedIn -->
            <button class="share-btn" (click)="shareLinkedIn()" aria-label="Share on LinkedIn">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
                </svg>
            </button>

            <!-- X / Twitter -->
            <button class="share-btn" (click)="shareTwitter()" aria-label="Share on X">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L2.02 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
                </svg>
            </button>

            <!-- Copy link -->
            <button class="share-btn share-btn--copy" [class.copied]="copySuccess" (click)="copyLink()"
                aria-label="Copy link">
                <svg *ngIf="!copySuccess" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                    <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71" />
                    <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71" />
                </svg>
                <svg *ngIf="copySuccess" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                    <polyline points="20 6 9 17 4 12" />
                </svg>
            </button>
        </div>

        <a routerLink="/news" class="article__footer-back">← Back to News</a>
    </div>
</footer>

    <app-cta></app-cta>
</div>
