<section class="page-header" [style.background-image]="'url(' + bgImage + ')'">
    <div class="overlay">
        <div class="title-row">
            <app-reveal [blur]="true">
                <span class="bracket">[ </span>
            </app-reveal>
            <div class="content">
                <app-reveal [blur]="true">
                    <h1 class="title">{{ title }}</h1>
                </app-reveal>
                @if (classification) {
                    <div class="classification">{{ classification }}</div>
                }
            </div>

            <app-reveal [blur]="true">
                <span class="bracket"> ]</span>
            </app-reveal>
        </div>
    </div>
</section>
