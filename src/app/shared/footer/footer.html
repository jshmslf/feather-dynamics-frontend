<footer class="footer">
    <div class="footer__container">

        <!-- GROUP 1: LOGO -->
        <div class="footer__group footer__group--logo">
            <img src="/assets/logo-text-white.png" alt="Feather Dynamics Logo" />
        </div>

        <!-- GROUP 2: INFO -->
        <div class="footer__group footer__group--info">
            <span class="title">INFO</span>
            <p>Monterey, CA</p>
            <p>Santa Barbara, CA</p>
            <p>Austin, TX</p>
            <a href="mailto:info@featherdynamics.com">
                info@featherdynamics.com
            </a>

        </div>

        <!-- GROUP 3: LINKS -->
        <div class="footer__group footer__group--links">
            <span class="title">LINKS</span>
            <a routerLink="/what-we-do">What We Do</a>
            <a routerLink="/contact">Contact Us</a>
            <a href="https://linkedin.com" target="_blank" rel="noopener">
                LinkedIn
            </a>
        </div>

        <div>
            <img src="/assets/decos/madeinusa.png" alt="Made in USA" class="footer__usa" />
        </div>

    </div>

    <!-- BOTTOM BAR -->
    <div class="footer__bottom">
        <div class="footer__bottom-inner">
            <div class="footer__copyright">
                Copyright © {{year}} Feather Dynamics - All Rights Reserved.
            </div>

            <div class="footer__legal">
                <a routerLink="/privacy-policy">Privacy Policy</a>
                <span>|</span>
                <a routerLink="/terms">Terms &amp; Conditions</a>
            </div>
        </div>
    </div>
</footer>
