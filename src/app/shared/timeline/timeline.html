<div class="tl-spacer-before" aria-hidden="true"></div>

<div #stickySection class="tl-scroll-driver" [style.--total-items]="totalItems">
    <div class="tl-sticky">

        <!-- ── Left: Year Column ── -->
        <aside class="tl-year-col" aria-live="polite" aria-atomic="true">
            <div class="tl-year-track">
                <span class="tl-year-label" [class.tl-year--exit]="yearAnimating"
                    [attr.aria-label]="'Year ' + displayYear">{{ displayYear }}</span>
            </div>

            <!-- Progress bar -->
            <div class="tl-progress-bar" aria-hidden="true">
                <div class="tl-progress-fill" [style.height.%]="scrollProgress * 100"></div>
            </div>
        </aside>

        <!-- ── Right: Content Strip ── -->
        <section class="tl-content-col" aria-label="Timeline events">
            <div class="tl-card-strip" [style.transform]="'translateY(' + stripOffset + ')'">
                <ng-container *ngFor="let group of groups; let gi = index">
                    <article *ngFor="let item of group.items; let ii = index" class="tl-card"
                        [class.tl-card--active]="isItemActive(gi, ii)" [class.tl-card--past]="isItemPast(gi, ii)"
                        [attr.aria-hidden]="!isItemActive(gi, ii)">
                        <!-- Image -->
                        <div class="tl-card__image-wrap" *ngIf="item.image">
                            <img [src]="item.image" [alt]="item.title || item.date" class="tl-card__image"
                                loading="lazy" />
                            <div class="tl-card__image-overlay"></div>
                        </div>

                        <!-- Text -->
                        <div class="tl-card__body">
                            <!-- <span class="tl-card__eyebrow">{{ item.date }}</span> -->
                            <h3 class="tl-card__title" *ngIf="item.title">{{ item.title }}</h3>
                            <p class="tl-card__content">{{ item.content }}</p>
                        </div>
                    </article>
                </ng-container>
            </div>

            <!-- Scroll hint (visible only at start) -->
            <div class="tl-scroll-hint" [class.tl-scroll-hint--hidden]="scrollProgress > 0.05" aria-hidden="true">
                <span>Scroll to explore</span>
                <svg width="16" height="24" viewBox="0 0 16 24" fill="none">
                    <rect x="6.5" y="1" width="3" height="5" rx="1.5" fill="currentColor" />
                    <path d="M8 15l-4-4h8l-4 4z" fill="currentColor" />
                    <rect x="1" y="1" width="14" height="22" rx="7" stroke="currentColor" stroke-width="1.5" />
                </svg>
            </div>
        </section>

        <!-- ── Dot Navigation ── -->
        <nav class="tl-dot-nav" aria-label="Timeline navigation">
            <ng-container *ngFor="let group of groups; let gi = index">
                <button *ngFor="let item of group.items; let ii = index" class="tl-dot"
                    [class.tl-dot--active]="isItemActive(gi, ii)" [class.tl-dot--past]="isItemPast(gi, ii)"
                    [attr.aria-label]="group.year + (item.title ? ' – ' + item.title : '')"
                    (click)="scrollToItem(gi, ii)"></button>
            </ng-container>
        </nav>

    </div>
</div>

<!-- Spacer after -->
<div class="tl-spacer-after" aria-hidden="true"></div>
